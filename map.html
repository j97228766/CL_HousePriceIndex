<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page.title.map">地圖 – 臺灣住宅價格指數</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/i18n.js"></script>
  <style>
    .map-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
      align-items: start;
    }
    @media(max-width:900px){ .map-layout { grid-template-columns: 1fr; } }
    .legend-item { display:flex; align-items:center; gap:.5rem; font-size:.8rem; margin:.2rem 0; }
    .legend-swatch { width:18px;height:14px;border-radius:2px;flex-shrink:0; }
    .leaflet-popup-content-wrapper { border-radius:8px!important; }
    .no-data-msg {
      color:var(--muted);
      font-style:italic;
      font-size:.9rem;
      text-align:center;
      padding:2rem;
    }
    .growth-bar {
      height:6px;border-radius:3px;margin-top:4px;
      background:linear-gradient(90deg,var(--success),var(--accent));
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">🏠 Taiwan HPI</a>
    <ul class="nav-links">
      <li><a href="index.html"      data-i18n="nav.timeseries">時間序列</a></li>
      <li><a href="map.html"        class="active" data-i18n="nav.gismap">地圖</a></li>
      <li><a href="comparison.html" data-i18n="nav.comparison">指數比較</a></li>
      <li><a href="methodology.html" data-i18n="nav.methodology">研究方法</a></li>
    </ul>
    <button id="lang-toggle" class="lang-btn"
            onclick="setLang(document.documentElement.lang==='zh'?'en':'zh')">EN</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-content">
    <h1 data-i18n="map.hero.title">GIS 地圖 — 各地區住宅價格</h1>
    <p  data-i18n="map.hero.desc">將滑鼠移至或點擊任一地區，查看最新住宅價格指數及增長率。</p>
  </div>
</div>

<div class="container">

  <div class="note-box" data-i18n="map.note">
    💡 顯示為<strong>藍色梯度</strong>的地區有 CL 指數資料。灰色地區（苗栗、南投、彰化、宜蘭）未單獨涵蓋於此指數中。新竹市+縣及嘉義市+縣各別整合為一個地區。
  </div>

  <div class="map-layout">

    <!-- Map -->
    <div class="card" style="padding:0;overflow:hidden">
      <div id="map"></div>
    </div>

    <!-- Info panel -->
    <div>
      <div class="card map-info-panel" id="info-panel">
        <div class="card-title" id="info-title" data-i18n="map.panel.hover">將滑鼠移至地區</div>
        <div id="info-body">
          <p class="no-data-msg" data-i18n="map.panel.default">點擊地圖上的地區以查看住宅價格統計資料。</p>
        </div>
      </div>

      <!-- Legend -->
      <div class="card">
        <div class="card-title" style="margin-bottom:.6rem" data-i18n="map.legend.title">地圖圖例</div>
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:.6rem"
           data-i18n="map.legend.desc">顏色深淺 = 年增率（顏色越深代表增長率越高）</p>
        <div id="legend-scale"></div>
        <div class="legend-item" style="margin-top:.75rem">
          <div class="legend-swatch" style="background:#bdc3c7"></div>
          <span data-i18n="map.legend.nodata">無獨立資料（已整合）</span>
        </div>
      </div>
    </div>

  </div>
</div>

<footer data-i18n="map.footer">
  臺灣住宅價格指數 &nbsp;|&nbsp;
  地圖：OpenStreetMap 貢獻者，Leaflet &nbsp;|&nbsp; 資料：內政部實價登錄
</footer>

<script>
// ── City → GeoJSON feature name mapping ──────────────────────────
const CITY_MAP = {
  taipei:     ['Taipei City'],
  newtaipei:  ['New Taipei City'],
  taoyuan:    ['Taoyuan County'],
  hsinchu:    ['Hsinchu City','Hsinchu County'],
  taichung:   ['Taichung City'],
  tainan:     ['Tainan City'],
  kaohsiung:  ['Kaohsiung City'],
  keelung:    ['Keelung City'],
  chiayi:     ['Chiayi City','Chiayi County'],
  yunlin:     ['Yunlin County','Kinmen County','Penghu County','Lienchiang County'],
  pingtung:   ['Pingtung County'],
  hualien:    ['Hualien County'],
  taitung:    ['Taitung County'],
};

const GEO_TO_CLL = {};
Object.entries(CITY_MAP).forEach(([cllKey, names]) => {
  names.forEach(n => { GEO_TO_CLL[n] = cllKey; });
});

let statsData = {}, geoLayer, map;

// ── Initialise map ────────────────────────────────────────────────
map = L.map('map', { zoomSnap: 0.5 }).setView([23.7, 121], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 12,
}).addTo(map);

// ── Color scale based on YoY growth ───────────────────────────────
function growthColor(yoy) {
  if(yoy == null) return '#bdc3c7';
  const t_val = Math.min(Math.max((yoy + 5) / 25, 0), 1);
  if(t_val < 0.33) {
    const s = t_val / 0.33;
    return lerpColor('#27ae60','#f39c12',s);
  } else if(t_val < 0.67) {
    const s = (t_val-0.33)/0.34;
    return lerpColor('#f39c12','#e67e22',s);
  } else {
    const s = (t_val-0.67)/0.33;
    return lerpColor('#e67e22','#c0392b',s);
  }
}
function lerpColor(a,b,t_val) {
  const ar=parseInt(a.slice(1,3),16), ag=parseInt(a.slice(3,5),16), ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16), bg=parseInt(b.slice(3,5),16), bb=parseInt(b.slice(5,7),16);
  const r=Math.round(ar+(br-ar)*t_val).toString(16).padStart(2,'0');
  const g=Math.round(ag+(bg-ag)*t_val).toString(16).padStart(2,'0');
  const bx=Math.round(ab+(bb-ab)*t_val).toString(16).padStart(2,'0');
  return `#${r}${g}${bx}`;
}

function buildLegend() {
  const container = document.getElementById('legend-scale');
  const steps = [-5,0,5,10,15,20];
  container.innerHTML = steps.map((v,i) => {
    const nextV = steps[i+1] ?? v+5;
    const color = growthColor((v+nextV)/2);
    return `<div class="legend-item">
      <div class="legend-swatch" style="background:${color}"></div>
      <span>${v >= 0 ? '+':''}${v}% ${t('map.legend.to')} ${nextV >= 0 ? '+':''}${nextV}% ${t('map.legend.yoy')}</span>
    </div>`;
  }).slice(0,-1).join('');
}

// ── Style function ────────────────────────────────────────────────
function styleFeature(feature) {
  const name   = feature.properties.name;
  const cllKey = GEO_TO_CLL[name];
  const s      = cllKey ? statsData[cllKey] : null;
  const color  = growthColor(s?.yoy_growth ?? null);
  return {
    fillColor:   color,
    fillOpacity: 0.72,
    color:       '#fff',
    weight:      1.5,
  };
}

// ── Info panel update ─────────────────────────────────────────────
let currentCllKey = null;

function showInfo(feature) {
  const name   = feature.properties.name;
  const cllKey = GEO_TO_CLL[name];
  const s      = cllKey ? statsData[cllKey] : null;
  currentCllKey = cllKey || null;

  const regionLabel = cllKey ? getCityLabel(cllKey, s ? s.label : name) : name;
  document.getElementById('info-title').textContent = regionLabel;

  if(!s) {
    document.getElementById('info-body').innerHTML =
      `<p class="no-data-msg">${t('map.panel.nodata')}</p>`;
    return;
  }

  const qoqColor = s.qoq_growth > 0 ? 'var(--accent)' : 'var(--success)';
  const yoyColor = s.yoy_growth > 0 ? 'var(--accent)' : 'var(--success)';
  const direction = s.latest_val >= 1 ? t('map.stat.risen') : t('map.stat.fallen');

  document.getElementById('info-body').innerHTML = `
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">
      ${t('map.stat.latest')} <strong>${s.latest_q}</strong>
    </p>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="val">${s.latest_val.toFixed(3)}</div>
        <div class="lbl">${t('map.stat.index')}<br><small style="font-size:.65rem">${t('map.stat.base')}</small></div>
      </div>
      <div class="stat-box">
        <div class="val" style="color:${qoqColor}">
          ${s.qoq_growth > 0 ? '+':''}${s.qoq_growth}%
        </div>
        <div class="lbl">${t('map.stat.qoq')}</div>
      </div>
      <div class="stat-box">
        <div class="val" style="color:${yoyColor}">
          ${s.yoy_growth > 0 ? '+':''}${s.yoy_growth}%
        </div>
        <div class="lbl">${t('map.stat.yoy')}</div>
      </div>
    </div>
    <p style="font-size:.75rem;color:var(--muted);margin-top:.9rem">
      ${t('map.stat.desc')} ${direction}
      <strong>${Math.abs((s.latest_val-1)*100).toFixed(1)}%</strong>
    </p>`;
}

function clearInfo() {
  currentCllKey = null;
  document.getElementById('info-title').textContent = t('map.panel.hover');
  document.getElementById('info-body').innerHTML =
    `<p class="no-data-msg">${t('map.panel.default')}</p>`;
}

// ── Mouse events ──────────────────────────────────────────────────
function onEachFeature(feature, layer) {
  layer.on({
    mouseover: e => {
      e.target.setStyle({ weight:2.5, fillOpacity:0.88, color:'#555' });
      e.target.bringToFront();
      showInfo(feature);
    },
    mouseout: e => {
      geoLayer.resetStyle(e.target);
      clearInfo();
    },
    click: e => {
      map.fitBounds(e.target.getBounds(), { maxZoom: 10, padding: [20,20] });
      showInfo(feature);
    },
  });
}

// ── Load data then render ─────────────────────────────────────────
Promise.all([
  fetch('data/latest_stats.json').then(r => r.json()),
  fetch('data/taiwan_regions.geojson').then(r => r.json()),
]).then(([stats, geojson]) => {
  statsData = stats;
  buildLegend();

  geoLayer = L.geoJSON(geojson, {
    style:         styleFeature,
    onEachFeature: onEachFeature,
  }).addTo(map);

  map.fitBounds(geoLayer.getBounds(), { padding: [10,10] });
});

// ── Language change handler ───────────────────────────────────────
function onLangChange(lang) {
  buildLegend();
  clearInfo();
}

initLang();
</script>
</body>
</html>
